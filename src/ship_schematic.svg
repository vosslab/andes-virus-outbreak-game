	<text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#172026">Cabins (Starboard)</text>
	<path d="M270 376 H530 M322 342 V438 M374 342 V438 M426 342 V438 M478 342 V438" stroke="#2f6f88" stroke-width="2"/>
