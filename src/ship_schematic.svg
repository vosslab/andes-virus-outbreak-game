<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
	<title id="title">Cruise ship deck plan with passenger health states.</title>
	<desc id="desc">Original cruise ship schematic with cabins, corridor spine, dining, lounge theater, pool deck, infirmary, isolation, crew area, and helipad.</desc>
	<rect width="1200" height="520" fill="#f5f7f8"/>
	<path d="M54 260 C98 94 220 38 394 34 L996 34 C1088 34 1148 126 1148 260 C1148 394 1088 486 996 486 L394 486 C220 482 98 426 54 260 Z" fill="#ffffff" stroke="#25313a" stroke-width="6"/>
	<path d="M92 260 C130 128 238 72 398 70 L982 70 C1052 70 1112 148 1112 260 C1112 372 1052 450 982 450 L398 450 C238 448 130 392 92 260 Z" fill="#edf2f4" stroke="#8a98a3" stroke-width="2"/>
